name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências web
        run: |
          cd artifacts/zenkai-game
          corepack enable
          pnpm install

      - name: Sincronizar Capacitor Android
        run: |
          cd artifacts/zenkai-game
          npx cap sync android

      - name: Dar permissão ao Gradle
        run: chmod +x artifacts/zenkai-game/android/gradlew

      - name: Compilar APK
        run: |
          cd artifacts/zenkai-game/android
          ./gradlew assembleDebug

      - name: Enviar APK pronto
        uses: actions/upload-artifact@v4
        with:
          name: goku-clicker-apk
          path: artifacts/zenkai-game/android/app/build/outputs/apk/debug/app-debug.apk
